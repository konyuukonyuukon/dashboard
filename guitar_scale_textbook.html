<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Scale 教科書 — アドリブへの道</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--bg2:#151515;--bg3:#1c1c1c;--bg4:#252525;--bg5:#2e2e2e;
  --border:#2a2a2a;--border2:#383838;
  --text:#e8e8e8;--text2:#999;--text3:#5a5a5a;
  --accent:#7c6cf0;--accent-bg:#1a1630;--accent-light:#a99df7;
  --green:#3fcf7f;--green-bg:#0c2616;--green-border:#1a5035;
  --red:#ef6b6b;--red-bg:#2a0e0e;--red-border:#5a1e1e;
  --teal:#2cc4b0;--teal-bg:#0c201e;
  --amber:#e8a820;--amber-bg:#201a08;
  --blue:#5a9cf0;
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14px;line-height:1.7}

/* Sidebar */
.sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;transition:transform .25s}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.sidebar-header p{font-size:11px;color:var(--text3);margin-top:4px}
.sidebar-progress{margin:12px 16px;padding:8px 12px;background:var(--bg3);border-radius:8px;font-size:12px;color:var(--text2)}
.sidebar-progress .bar{height:3px;background:var(--bg5);border-radius:2px;margin-top:6px}
.sidebar-progress .bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}
.part-label{padding:12px 16px 4px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}
.ch-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 16px;border:none;background:none;color:var(--text2);font-size:13px;text-align:left;cursor:pointer;transition:all .12s}
.ch-btn:hover{background:var(--bg3);color:var(--text)}
.ch-btn.active{background:var(--accent-bg);color:var(--accent-light);border-right:2px solid var(--accent)}
.ch-btn .ch-num{width:22px;height:22px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text3);flex-shrink:0}
.ch-btn.active .ch-num{background:var(--accent);color:#fff}
.ch-btn.done .ch-num{background:var(--green);color:#000}

/* Mobile menu */
.menu-toggle{display:none;position:fixed;top:10px;left:10px;z-index:200;width:36px;height:36px;border-radius:8px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:18px;cursor:pointer;align-items:center;justify-content:center}
@media(max-width:800px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .menu-toggle{display:flex}
  .main{margin-left:0!important}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}
  .overlay.show{display:block}
}

/* Main */
.main{margin-left:260px;flex:1;min-height:100vh}
.content{max-width:720px;margin:0 auto;padding:24px 20px 60px}

/* Chapter header */
.ch-header{margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.ch-header .part{font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.ch-header h2{font-size:22px;font-weight:600;color:var(--text);margin-bottom:4px}
.ch-header .sub{font-size:13px;color:var(--text2)}

/* Lesson content */
.lesson-section{margin-bottom:28px}
.lesson-section h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.lesson-section h3 .icon{font-size:14px;opacity:.6}
.lesson p{font-size:14px;color:var(--text2);line-height:1.8;margin-bottom:10px}
.lesson ul,.lesson ol{font-size:14px;color:var(--text2);line-height:1.8;padding-left:1.4em;margin-bottom:10px}
.lesson li{margin-bottom:4px}
.lesson strong{color:var(--text);font-weight:500}

.info-box{padding:12px 16px;background:var(--bg3);border-radius:8px;border-left:3px solid var(--accent);margin:12px 0;font-size:13px;color:var(--text2);line-height:1.7}
.info-box.tip{border-left-color:var(--green)}
.info-box.warn{border-left-color:var(--amber)}
.info-box .box-title{font-weight:600;color:var(--text);margin-bottom:4px;font-size:13px}

.note-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.note-table th{text-align:left;padding:8px 12px;background:var(--bg4);border-bottom:1px solid var(--border);color:var(--text3);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.note-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text)}
.note-table tr:last-child td{border-bottom:none}
.note-table .hl{color:var(--accent-light);font-weight:500}
.note-table code{background:var(--bg4);padding:2px 6px;border-radius:4px;font-size:12px;font-family:'Consolas','Monaco',monospace}

.badge{display:inline-block;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:500}
.b-purple{background:var(--accent-bg);color:var(--accent-light)}
.b-green{background:var(--green-bg);color:var(--green)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-teal{background:var(--teal-bg);color:var(--teal)}
.b-red{background:var(--red-bg);color:var(--red)}

/* Fretboard SVG */
.fb-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;overflow-x:auto;margin:12px 0}
.fb-label{font-size:12px;color:var(--text3);margin-top:6px}

/* Tab diagram */
.tab-diagram{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-family:'Consolas','Monaco',monospace;font-size:13px;color:var(--text2);line-height:1.6;overflow-x:auto;margin:12px 0;white-space:pre}

/* Quiz */
.quiz-area{margin-top:20px}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.quiz-header h3{font-size:16px;font-weight:600}
.quiz-score{font-size:13px;color:var(--text2)}
.quiz-score strong{color:var(--text)}
.quiz-progress{height:3px;background:var(--bg5);border-radius:2px;margin-bottom:16px}
.quiz-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.q-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.q-top{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.q-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.q-text{font-size:17px;font-weight:500;color:var(--text);line-height:1.5}
.q-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px}
.q-choice{padding:11px 14px;border:1px solid var(--border2);border-radius:8px;font-size:14px;cursor:pointer;background:var(--bg3);color:var(--text);text-align:left;transition:all .12s;line-height:1.4}
.q-choice:hover:not([disabled]){background:var(--accent-bg);border-color:var(--accent);color:var(--accent-light)}
.q-choice.correct{background:var(--green-bg)!important;border-color:var(--green-border)!important;color:var(--green)!important}
.q-choice.wrong{background:var(--red-bg)!important;border-color:var(--red-border)!important;color:var(--red)!important}
.q-choice[disabled]{cursor:default}
.q-result{margin:0 14px 10px;padding:12px 14px;border-radius:8px;font-size:13px;line-height:1.6}
.q-result.ok{background:var(--green-bg);color:#86efac;border:1px solid var(--green-border)}
.q-result.ng{background:var(--red-bg);color:#fca5a5;border:1px solid var(--red-border)}
.q-result .rl{font-weight:600;display:block;margin-bottom:4px}
.q-next-wrap{padding:0 14px 14px}
.q-next{padding:9px 18px;border:1px solid var(--accent);border-radius:8px;font-size:13px;cursor:pointer;background:var(--accent-bg);color:var(--accent-light);font-weight:500;transition:all .12s}
.q-next:hover{background:var(--accent);color:#fff}
.complete-banner{padding:20px;text-align:center;background:var(--green-bg);border:1px solid var(--green-border);border-radius:10px;margin:16px 0}
.complete-banner h4{font-size:16px;color:var(--green);margin-bottom:6px}
.complete-banner p{font-size:13px;color:#86efac}
.ch-nav{display:flex;justify-content:space-between;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
.ch-nav button{padding:9px 18px;border:1px solid var(--border2);border-radius:8px;font-size:13px;cursor:pointer;background:var(--bg3);color:var(--text2);transition:all .12s}
.ch-nav button:hover{background:var(--bg4);color:var(--text)}
.ch-nav button.primary{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-light)}
.start-quiz-btn{display:inline-block;padding:10px 24px;border:1px solid var(--accent);border-radius:8px;font-size:14px;cursor:pointer;background:var(--accent-bg);color:var(--accent-light);font-weight:500;transition:all .12s;margin-top:8px}
.start-quiz-btn:hover{background:var(--accent);color:#fff}
.practice-list{list-style:none;padding:0;margin:8px 0}
.practice-list li{padding:8px 12px;background:var(--bg3);border-radius:6px;margin-bottom:6px;font-size:13px;color:var(--text2);border-left:3px solid var(--teal)}
.practice-list li strong{color:var(--text)}
@media(max-width:600px){.q-choices{grid-template-columns:1fr}}

/* Scale degree colors on fretboard */
.root-dot{fill:var(--teal)}
.scale-dot{fill:none;stroke:var(--teal);stroke-width:1.5}
.ghost-dot{fill:#222;opacity:.5}
</style>
</head>
<body>

<button class="menu-toggle" onclick="toggleSidebar()">☰</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>🎸 Guitar Scale 教科書</h1>
    <p>アドリブ・ソロギターへの道</p>
  </div>
  <div class="sidebar-progress">
    <span id="progress-label">進捗: 0 / 10 章</span>
    <div class="bar"><div class="bar-fill" id="progress-bar" style="width:0%"></div></div>
  </div>
  <div class="part-label">Part 1 — 基礎知識</div>
  <button class="ch-btn active" onclick="goTo(0)" id="sb-0"><span class="ch-num">1</span>音名と12音の世界</button>
  <button class="ch-btn" onclick="goTo(1)" id="sb-1"><span class="ch-num">2</span>指板を覚える</button>
  <button class="ch-btn" onclick="goTo(2)" id="sb-2"><span class="ch-num">3</span>インターバル</button>
  <div class="part-label">Part 2 — スケールを学ぶ</div>
  <button class="ch-btn" onclick="goTo(3)" id="sb-3"><span class="ch-num">4</span>メジャースケール</button>
  <button class="ch-btn" onclick="goTo(4)" id="sb-4"><span class="ch-num">5</span>マイナースケール</button>
  <button class="ch-btn" onclick="goTo(5)" id="sb-5"><span class="ch-num">6</span>ペンタトニック</button>
  <button class="ch-btn" onclick="goTo(6)" id="sb-6"><span class="ch-num">7</span>ブルーススケール</button>
  <div class="part-label">Part 3 — アドリブへ</div>
  <button class="ch-btn" onclick="goTo(7)" id="sb-7"><span class="ch-num">8</span>モードスケール</button>
  <button class="ch-btn" onclick="goTo(8)" id="sb-8"><span class="ch-num">9</span>コードトーン</button>
  <button class="ch-btn" onclick="goTo(9)" id="sb-9"><span class="ch-num">10</span>アドリブ実践</button>
  <div class="part-label" style="margin-top:8px">テスト</div>
  <button class="ch-btn" onclick="goTo(10)" id="sb-10"><span class="ch-num">★</span>総合テスト</button>
</nav>

<div class="main">
  <div class="content" id="main-content"></div>
</div>

<script>
const N=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NJP={C:'ド','C#':'ド#',D:'レ','D#':'レ#',E:'ミ',F:'ファ','F#':'ファ#',G:'ソ','G#':'ソ#',A:'ラ','A#':'ラ#',B:'シ'};
const NALT={'C#':'D♭','D#':'E♭','F#':'G♭','G#':'A♭','A#':'B♭'};
const STR=[4,9,2,7,11,4]; // 1弦E,2弦B,3弦G,4弦D,5弦A,6弦E (index)
const STR_NAME=['1弦(E)','2弦(B)','3弦(G)','4弦(D)','5弦(A)','6弦(E)'];
const SC={
  major:[0,2,4,5,7,9,11],minor:[0,2,3,5,7,8,10],
  penta_maj:[0,2,4,7,9],penta_min:[0,3,5,7,10],
  blues:[0,3,5,6,7,10],dorian:[0,2,3,5,7,9,10],
  mixolydian:[0,2,4,5,7,9,10],phrygian:[0,1,3,5,7,8,10],
  lydian:[0,2,4,6,7,9,11]
};
const SC_NAME={major:'メジャースケール',minor:'ナチュラルマイナー',penta_maj:'メジャーペンタトニック',penta_min:'マイナーペンタトニック',blues:'ブルーススケール',dorian:'ドリアン',mixolydian:'ミクソリディアン',phrygian:'フリジアン',lydian:'リディアン'};
const SC_FORM={major:'全全半全全全半',minor:'全半全全半全全',penta_maj:'全全1.5全1.5',penta_min:'1.5全全1.5全',blues:'1.5全半半1.5全',dorian:'全半全全全半全',mixolydian:'全全半全全半全'};
const IV=[
  {n:'完全1度',semi:0},{n:'短2度',semi:1},{n:'長2度',semi:2},{n:'短3度',semi:3},
  {n:'長3度',semi:4},{n:'完全4度',semi:5},{n:'減5度/増4度',semi:6},{n:'完全5度',semi:7},
  {n:'短6度',semi:8},{n:'長6度',semi:9},{n:'短7度',semi:10},{n:'長7度',semi:11},{n:'完全8度',semi:12}
];

const PENTA_BOXES_A = [
  {name:'Box 1（基本）',frets:[[5,8],[5,8],[5,7],[5,7],[5,7],[5,8]]},
  {name:'Box 2',frets:[[8,10],[8,10],[7,9],[7,10],[7,10],[8,10]]},
  {name:'Box 3',frets:[[10,12],[10,13],[9,12],[10,12],[10,12],[10,12]]},
  {name:'Box 4',frets:[[12,15],[13,15],[12,14],[12,14],[12,15],[12,15]]},
  {name:'Box 5',frets:[[3,5],[3,5],[2,5],[2,5],[3,5],[3,5]]}
];

let currentCh=0;
let completed=JSON.parse(localStorage.getItem('gst_done')||'{}');

function rand(a){return a[Math.floor(Math.random()*a.length)]}
function randInt(a,b){return a+Math.floor(Math.random()*(b-a+1))}
function shuffle(a){let r=[...a];for(let i=r.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function scaleNotes(root,type){const ri=N.indexOf(root);return SC[type].map(s=>N[(ri+s)%12]);}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function updateProgress(){
  const done=Object.keys(completed).filter(k=>completed[k]).length;
  document.getElementById('progress-label').textContent=`進捗: ${done} / 10 章`;
  document.getElementById('progress-bar').style.width=(done/10*100)+'%';
  for(let i=0;i<10;i++){
    const btn=document.getElementById('sb-'+i);
    btn.classList.toggle('done',!!completed[i]);
  }
}

function markDone(ch){
  completed[ch]=true;
  localStorage.setItem('gst_done',JSON.stringify(completed));
  updateProgress();
}

function goTo(ch){
  currentCh=ch;
  document.querySelectorAll('.ch-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sb-'+ch).classList.add('active');
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  renderChapter(ch);
  window.scrollTo(0,0);
}

// ===== Fretboard SVG builder =====
function buildFretboard(opts={}){
  const {highlight=[],root=null,startFret=0,endFret=12,showAll=false,boxNotes=null,width=660}=opts;
  const frets=endFret-startFret;
  const H=170,pL=42,pR=14,pT=26,pB=20;
  const fw=(width-pL-pR)/frets;
  const sh=(H-pT-pB)/5;
  const strOpen=['E','B','G','D','A','E'];
  let s=`<svg viewBox="0 0 ${width} ${H}" xmlns="http://www.w3.org/2000/svg" style="min-width:${Math.min(width,500)}px;width:100%">`;
  for(let f=0;f<=frets;f++){
    const x=pL+f*fw;const af=f+startFret;
    s+=`<line x1="${x}" y1="${pT}" x2="${x}" y2="${H-pB}" stroke="#333" stroke-width="${af===0?2.5:.5}"/>`;
  }
  for(let st=0;st<6;st++){
    const y=pT+st*sh;
    s+=`<line x1="${pL}" y1="${y}" x2="${width-pR}" y2="${y}" stroke="#555" stroke-width="${.4+st*.2}"/>`;
    s+=`<text x="${pL-5}" y="${y+4}" text-anchor="end" font-size="9" fill="#555">${strOpen[st]}</text>`;
  }
  [3,5,7,9,12,15,17].filter(f=>f>startFret&&f<=endFret).forEach(f=>{
    const x=pL+(f-startFret-.5)*fw;
    if(f===12){s+=`<circle cx="${x}" cy="${pT+sh*1.5}" r="2.5" fill="#2a2a2a"/><circle cx="${x}" cy="${pT+sh*3.5}" r="2.5" fill="#2a2a2a"/>`;
    }else{s+=`<circle cx="${x}" cy="${H/2}" r="2.5" fill="#2a2a2a"/>`;}
    s+=`<text x="${x}" y="${H-3}" text-anchor="middle" font-size="9" fill="#444">${f}</text>`;
  });

  const highlightSet=new Set(highlight.map(n=>N.indexOf(n)));
  const rootIdx=root?N.indexOf(root):-1;

  for(let st=0;st<6;st++){
    const base=STR[st];
    for(let f=startFret;f<=endFret;f++){
      const ni=(base+f)%12;
      const fx=pL+(f===startFret&&startFret===0?-12:(f-startFret)*fw-fw/2);
      if(f===startFret&&startFret>0) continue;
      const y=pT+st*sh;
      const isRoot=ni===rootIdx;
      const inScale=highlightSet.has(ni);

      if(boxNotes){
        const bx=boxNotes[st];
        if(bx&&bx.includes(f)){
          if(isRoot){
            s+=`<circle cx="${fx}" cy="${y}" r="10" fill="#2cc4b0"/>`;
            s+=`<text x="${fx}" y="${y+4}" text-anchor="middle" font-size="10" fill="#000" font-weight="700">${N[ni]}</text>`;
          }else{
            s+=`<circle cx="${fx}" cy="${y}" r="9" fill="none" stroke="#2cc4b0" stroke-width="1.5"/>`;
            s+=`<text x="${fx}" y="${y+4}" text-anchor="middle" font-size="9" fill="#ccc">${N[ni]}</text>`;
          }
        }else{
          s+=`<circle cx="${fx}" cy="${y}" r="3" fill="#1a1a1a" opacity=".3"/>`;
        }
      }else if(isRoot){
        s+=`<circle cx="${fx}" cy="${y}" r="10" fill="#2cc4b0"/>`;
        s+=`<text x="${fx}" y="${y+4}" text-anchor="middle" font-size="10" fill="#000" font-weight="700">${N[ni]}</text>`;
      }else if(inScale){
        s+=`<circle cx="${fx}" cy="${y}" r="9" fill="none" stroke="#2cc4b0" stroke-width="1.5"/>`;
        s+=`<text x="${fx}" y="${y+4}" text-anchor="middle" font-size="9" fill="#ccc">${N[ni]}</text>`;
      }else if(showAll){
        s+=`<circle cx="${fx}" cy="${y}" r="8" fill="#151515" stroke="#2a2a2a" stroke-width=".5"/>`;
        s+=`<text x="${fx}" y="${y+4}" text-anchor="middle" font-size="8" fill="#444">${N[ni]}</text>`;
      }else{
        s+=`<circle cx="${fx}" cy="${y}" r="3" fill="#1a1a1a" opacity=".3"/>`;
      }
    }
  }
  s+='</svg>';
  return s;
}

function buildBoxDiagram(box,rootNote){
  const ri=N.indexOf(rootNote);
  const allFrets=box.frets.flat();
  const minF=Math.min(...allFrets);
  const maxF=Math.max(...allFrets);
  const boxMap=box.frets.map(pair=>[...new Set(pair)]);
  return buildFretboard({highlight:scaleNotes(rootNote,'penta_min'),root:rootNote,startFret:Math.max(0,minF-1),endFret:maxF+1,boxNotes:boxMap});
}

// ===== Quiz Engine =====
let quizState={questions:[],idx:0,score:0,total:0};

function startQuiz(questions,chIdx){
  quizState={questions:shuffle(questions).slice(0,Math.min(questions.length,10)),idx:0,score:0,total:0,chIdx};
  renderQuizQ();
}

function renderQuizQ(){
  const qs=quizState.questions;
  if(quizState.idx>=qs.length){
    const pct=Math.round(quizState.score/qs.length*100);
    let msg=pct>=80?'素晴らしい！この章の内容をしっかり理解しています。':pct>=60?'あと少し！もう一度レッスンを読み返してみましょう。':'まだ理解が浅い部分があります。レッスンを復習してからもう一度挑戦しましょう。';
    if(pct>=80&&quizState.chIdx!==undefined&&quizState.chIdx<10) markDone(quizState.chIdx);
    document.getElementById('quiz-container').innerHTML=`
      <div class="complete-banner">
        <h4>${pct>=80?'🎉 合格！':'📝 もう少し！'}</h4>
        <p>${quizState.score} / ${qs.length} 正解（${pct}%）— ${msg}</p>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="start-quiz-btn" onclick="startQuiz(CH_QUIZZES[${quizState.chIdx}],${quizState.chIdx})">もう一度</button>
        ${quizState.chIdx<9?`<button class="start-quiz-btn" style="background:var(--bg3);border-color:var(--border2);color:var(--text2)" onclick="goTo(${quizState.chIdx+1})">次の章へ →</button>`:''}
      </div>`;
    return;
  }
  const q=qs[quizState.idx];
  document.getElementById('quiz-container').innerHTML=`
    <div class="quiz-header">
      <h3>理解度チェック</h3>
      <span class="quiz-score">問 ${quizState.idx+1}/${qs.length}　正解 <strong>${quizState.score}</strong></span>
    </div>
    <div class="quiz-progress"><div class="quiz-progress-fill" style="width:${quizState.idx/qs.length*100}%"></div></div>
    <div class="q-card">
      <div class="q-top">
        <div class="q-label">${q.label||''}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="q-choices" id="qchoices">
        ${q.choices.map((c,i)=>`<button class="q-choice" onclick="quizAnswer(${i})" id="qc${i}">${esc(c)}</button>`).join('')}
      </div>
      <div id="q-res"></div>
      <div id="q-next-w" style="display:none" class="q-next-wrap"><button class="q-next" onclick="quizNext()">次へ →</button></div>
    </div>`;
}

function quizAnswer(idx){
  const q=quizState.questions[quizState.idx];
  if(document.querySelector('.q-choice[disabled]'))return;
  const chosen=q.choices[idx];
  const ok=chosen===q.ans;
  if(ok)quizState.score++;
  quizState.total++;
  document.querySelectorAll('.q-choice').forEach((b,i)=>{
    b.disabled=true;
    if(q.choices[i]===q.ans)b.classList.add('correct');
    else if(i===idx&&!ok)b.classList.add('wrong');
  });
  document.getElementById('q-res').innerHTML=`<div class="q-result ${ok?'ok':'ng'}"><span class="rl">${ok?'✓ 正解！':'✗ 不正解'}</span>${q.ex||''}</div>`;
  document.getElementById('q-next-w').style.display='block';
}
function quizNext(){quizState.idx++;renderQuizQ();}

function renderComprehensiveTest(el){
  const allQs=[];
  for(let i=0;i<10;i++){
    const gen=CH_QUIZZES[i]();
    const picked=shuffle(gen).slice(0,3);
    picked.forEach(q=>{q.label=`Ch.${i+1} ${q.label}`;});
    allQs.push(...picked);
  }
  el.innerHTML=`
    <div class="ch-header">
      <div class="part">総合テスト</div>
      <h2>全10章の理解度チェック</h2>
      <div class="sub">各章から出題。全体の理解度を測りましょう。</div>
    </div>
    <p style="font-size:14px;color:var(--text2);margin-bottom:16px">全${allQs.length}問。80%以上で合格です。</p>
    <button class="start-quiz-btn" onclick="startCompTest()">テスト開始</button>
    <div id="quiz-container" style="margin-top:16px"></div>`;
  window._compTestQs=allQs;
}
function startCompTest(){
  quizState={questions:shuffle(window._compTestQs),idx:0,score:0,total:0,chIdx:10};
  renderQuizQ();
}
